<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZiroGame - AdminPanel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { background-color: #4f46e5 !important; }
        .toast { position: fixed; top: 20px; right: 20px; background: #1e293b; padding: 15px; border-radius: 8px; border-left: 4px solid #6366f1; z-index: 9999; display: none; }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>

    <!-- Login -->
    <div id="login-sec" class="flex items-center justify-center h-screen p-4">
        <div class="bg-slate-800 p-8 rounded-2xl w-full max-w-sm">
            <h1 class="text-xl font-bold mb-6 text-center">ZiroGame Admin</h1>
            <input id="adm-email" type="email" placeholder="Email" class="w-full bg-slate-900 p-3 mb-3 rounded border border-slate-700 outline-none">
            <input id="adm-pass" type="password" placeholder="Password" class="w-full bg-slate-900 p-3 mb-6 rounded border border-slate-700 outline-none">
            <button onclick="login()" class="w-full bg-indigo-600 py-3 rounded font-bold">Đăng nhập</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dash-sec" class="hidden min-h-screen">
        <nav class="bg-slate-800 p-4 flex justify-between items-center border-b border-slate-700">
            <span class="font-bold">Admin Panel</span>
            <div class="flex gap-2">
                <button onclick="switchTab('games')" id="btn-games" class="tab-btn bg-slate-700 px-4 py-1 rounded">Game</button>
                <button onclick="switchTab('settings')" id="btn-settings" class="tab-btn bg-slate-700 px-4 py-1 rounded">Cài đặt</button>
                <button onclick="switchTab('withdrawals')" id="btn-withdrawals" class="tab-btn bg-slate-700 px-4 py-1 rounded">Rút tiền</button>
            </div>
            <button onclick="logout()" class="text-red-400">Đăng xuất</button>
        </nav>

        <main class="p-6 max-w-4xl mx-auto">
            <!-- Game Tab -->
            <div id="tab-games" class="tab-content">
                <h2 class="text-lg font-bold mb-4">Danh sách trò chơi</h2>
                <div id="games-list" class="space-y-2"></div>
            </div>

            <!-- Settings Tab -->
            <div id="tab-settings" class="tab-content">
                <h2 class="text-lg font-bold mb-4">Cấu hình hệ thống</h2>
                <button onclick="saveSettings()" class="bg-indigo-600 px-6 py-2 rounded font-bold">Lưu thay đổi</button>
            </div>

            <!-- Withdrawals Tab -->
            <div id="tab-withdrawals" class="tab-content">
                <h2 class="text-lg font-bold mb-4">Yêu cầu rút tiền</h2>
                <div id="wd-list" class="space-y-3"></div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyA2CtHpu_lm_tgrRshFzq-jD-PNrXzUrhM", authDomain: "zirogame-e078c.firebaseapp.com", databaseURL: "https://zirogame-e078c-default-rtdb.firebaseio.com", projectId: "zirogame-e078c", storageBucket: "zirogame-e078c.firebasestorage.app", messagingSenderId: "932469574208", appId: "1:932469574208:web:4ddf6635c3795f424dada5" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = "1:932469574208:web:4ddf6635c3795f424dada5";

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
        }

        async function login() {
            try {
                await auth.signInWithEmailAndPassword(document.getElementById('adm-email').value, document.getElementById('adm-pass').value);
                location.reload();
            } catch(e) { showToast("Lỗi: " + e.message); }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-sec').classList.add('hidden');
                document.getElementById('dash-sec').classList.remove('hidden');
                switchTab('withdrawals');
                loadWithdrawals();
            }
        });

        function loadWithdrawals() {
            db.collection(`artifacts/${appId}/public/data/withdrawals`)
              .where("status", "==", "pending")
              .onSnapshot(s => {
                const list = document.getElementById('wd-list'); list.innerHTML = '';
                s.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `
                        <div class="bg-slate-800 p-4 rounded border border-slate-700 flex justify-between items-center">
                            <div>
                                <p class="font-bold">${d.amount} Xu - ${d.method}</p>
                                <p class="text-green-400 font-mono text-sm">${d.details}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="upd('${doc.id}', 'paid')" class="bg-green-600 px-3 py-1 rounded text-sm">Duyệt</button>
                                <button onclick="upd('${doc.id}', 'rejected')" class="bg-red-600 px-3 py-1 rounded text-sm">Từ chối</button>
                            </div>
                        </div>`;
                });
            });
        }

        function upd(id, st) {
            db.collection(`artifacts/${appId}/public/data/withdrawals`).doc(id).update({
                status: st,
                adminProcessed: auth.currentUser.email,
                processedAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => showToast("Đã xử lý!"));
        }

        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
